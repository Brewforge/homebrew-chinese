name: schedule

on:
  # pull_request:
  #   branches: [main]
  # push:
  #   branches: [fix-*]
  schedule:
    # Every 12 hours
    # - cron: "20 */12 * * *"
    # Every day at 6am
    - cron: "0 6 * * *"
  # allow run manually
  workflow_dispatch:

concurrency:
  group: ${{ github.head_ref || github.ref_name }}

permissions: write-all

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_GITHUB_ACTIONS: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_FROM_API: 1
  HOMEBREW_RELOCATABLE_INSTALL_NAMES: 1

jobs:
  tap-syntax:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/homebrew/ubuntu22.04:master
    env:
      HOMEBREW_SIMULATE_MACOS_ON_LINUX: 1
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false
          debug: true

      - run: brew test-bot --only-tap-syntax

  bump-casks:
    name: Bump casks
    if: github.repository == 'brewforge/homebrew-chinese'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ macos-latest ]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false
          debug: false

      - name: Brew Tap
        uses: ./.github/actions/brew-tap

      - name: Git Cred
        uses: ./.github/actions/git-cred
        with:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}

      - name: Bump
        env:
          HOMEBREW_DEVELOPER: "1"
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        shell: bash -ieo pipefail {0}
        run: |
          rsync -lrv --exclude=.git "$(pwd)" "$(brew --repository brewforge/chinese)"
          cd "$(brew --repository brewforge/chinese)"
          ./.github/actions/bump-casks/script.sh

  auto-merge-prs:
    name: Auto merge PRs
    needs: bump-casks
    if: github.repository == 'brewforge/homebrew-chinese'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Auto merge PRs
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          # Get all open PRs
          prs=$(gh pr list --repo brewforge/homebrew-chinese --state open --json number,headRefName,author --jq '.[] | select(.author.login == "Brewforge-Bot-0") | .number')

          for pr in $prs; do
            echo "Processing PR #$pr"

            if gh pr view "$pr" --repo brewforge/homebrew-chinese --json mergeable --jq '.mergeable' | grep -q "MERGEABLE"; then
              echo "Merging PR #$pr"

              # Merge PR
              if gh pr merge "$pr" --repo brewforge/homebrew-chinese --merge; then
                echo "Successfully merged PR #$pr and deleted branch"
                sleep 5s
              else
                echo "Failed to merge PR #$pr"
              fi
            else
              echo "PR #$pr is not mergeable, skipping"
            fi
          done
