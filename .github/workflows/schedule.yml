name: schedule

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.head_ref || github.ref_name }}

permissions: write-all

defaults:
  run:
    shell: bash -ieo pipefail {0}

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_GITHUB_ACTIONS: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_FROM_API: 1
  HOMEBREW_RELOCATABLE_INSTALL_NAMES: 1

jobs:
  tap-syntax:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/homebrew/ubuntu22.04:master
    env:
      HOMEBREW_SIMULATE_MACOS_ON_LINUX: 1
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false
          debug: true

      - run: brew test-bot --only-tap-syntax

  bump-casks:
    name: Bump casks
    if: github.repository == 'brewforge/homebrew-chinese'
    runs-on: macos-latest
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false
          debug: false

      - name: Prepare Homebrew
        run: |
          brew tap brewforge/chinese
          brew install coreutils
          brew unlink coreutils && brew link coreutils
          brew install-bundler-gems --groups "audit,style"

      - name: Git Credentials
        run: |
          git config --global user.name "Brewforge-Bot"
          git config --global user.email "brewforge-bot@aliyun.com"
          git config --global credential.helper store
          printf "https://x-access-token:%s@github.com\n" "$HOMEBREW_GITHUB_API_TOKEN" > "$HOME/.git-credentials"
          chmod 0600 "$HOME/.git-credentials"

      - name: Bump
        run: |
          rsync -lrv --exclude=.git "$(pwd)" "$(brew --repository brewforge/chinese)"
          cd "$(brew --repository brewforge/chinese)"
          ./.github/scripts/bump-casks.sh
